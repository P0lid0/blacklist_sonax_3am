<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Blacklist SONAX</title>
<style>
  :root {
    --ink: #16202e; --ink-soft: #5b6b7d; --line: #dfe4ea;
    --surface: #fff; --bg: #eef1f5; --accent: #128a5a; --accent-dark: #0d6b45;
    --err: #c0392b; --mono: ui-monospace, "SF Mono", Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans); background: var(--bg); color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  .box { width: 100%; max-width: 360px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 12px; padding: 28px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--ink-soft); font-size: 13px; margin-bottom: 22px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  input { width: 100%; font-size: 15px; padding: 11px 12px; margin-bottom: 16px;
    border: 1px solid var(--line); border-radius: 8px; outline: none; font-family: var(--sans); }
  input:focus { border-color: var(--accent); }
  button { width: 100%; font-family: var(--sans); font-size: 15px; font-weight: 600;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 12px; cursor: pointer; }
  button:hover { background: var(--accent-dark); }
  .erro { color: var(--err); font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }
</style>
</head>
<body>
  <div class="box">
    <h1>Black<span>list</span> SONAX</h1>
    <p class="sub">Acesso restrito ao time.</p>
    <label for="u">Usuário</label>
    <input id="u" type="text" autocomplete="username">
    <label for="s">Senha</label>
    <input id="s" type="password" autocomplete="current-password">
    <button id="btn">Entrar</button>
    <div class="erro" id="erro"></div>
  </div>
<script>
  const btn = document.getElementById('btn');
  const erro = document.getElementById('erro');

  async function entrar() {
    erro.textContent = '';
    const usuario = document.getElementById('u').value.trim();
    const senha = document.getElementById('s').value;
    try {
      const r = await fetch('/painel/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      });
      const d = await r.json();
      if (d.ok) { window.location.href = '/'; }
      else { erro.textContent = d.erro || 'Falha no login.'; }
    } catch {
      erro.textContent = 'Sem conexão com o servidor.';
    }
  }

  btn.addEventListener('click', entrar);
  document.getElementById('s').addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
</script>
</body>
</html>
